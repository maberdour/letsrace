    body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:2rem}
    main{max-width:1200px;margin:0 auto;padding:0 1rem}
    .general-content{line-height:1.6}
    footer{margin-top:4rem;padding:2rem 0;border-top:1px solid #ddd;text-align:center;color:#666}

<body>


  <main>
    <div class="general-content">
      <h1>Recent Changes</h1>

    </div>


  </main>

  <!-- Load non-critical scripts after page load -->
             <script src="../assets/js/render.js?v=22"></script>
  <script>
    // Render header and footer
    renderHeader("Recent Changes");
    renderFooter();
  </script>
  <script>
    // Load analytics after page load
    setTimeout(() => {
      const script = document.createElement('script');
      script.src = 'https://gc.zgo.at/count.js';
      script.setAttribute('data-goatcounter', 'https://letsrace.goatcounter.com/count');
      script.async = true;
      document.head.appendChild(script);
    }, 1000);
  </script>
